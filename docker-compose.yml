version: "3.9"

services:
  # Optional: Redpanda as Kafka-compatible broker
  redpanda:
    image: vectorized/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
    profiles:
      - kafka

  anomaly_service:
    build:
      context: ./backend
      dockerfile: services/anomaly_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      USE_ML: "false"
      PYTHONPATH: /app

  ingestion_service:
    build:
      context: ./backend
      dockerfile: services/ingestion_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      ANOMALY_SERVICE_URL: http://anomaly_service:8001
      CREW_SERVICE_URL: http://crew_service:8003
      INCIDENT_API_URL: http://incident_api:8000
      PYTHONPATH: /app
      # Uncomment to enable Kafka consumer:
      # KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    volumes:
      - ./backend/data:/app/data

  crew_service:
    build:
      context: ./backend
      dockerfile: agents/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      ANOMALY_SERVICE_URL: http://anomaly_service:8001
      INGESTION_SERVICE_URL: http://ingestion_service:8002
      INCIDENT_API_URL: http://incident_api:8000
      PYTHONPATH: /app
    volumes:
      - ./backend/data:/app/data

  incident_api:
    build:
      context: ./backend
      dockerfile: services/incident_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend/data:/app/data
